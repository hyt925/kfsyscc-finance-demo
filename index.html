        }

        function runSkill(skillId) {
            document.querySelectorAll('.skill-btn').forEach(btn => btn.classList.remove('active'));
            let activeId = (skillId === 1) ? 'btn-skill1' : `btn-skill${skillId}`;
            const activeBtn = document.getElementById(activeId);
            if(activeBtn) activeBtn.classList.add('active');
            
            document.getElementById('loading-msg').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('welcome').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                
                dataModel[skillId].render();
                
                if(skillId !== '1-4' && skillId !== '1-5') {
                    document.getElementById('panel-title').innerHTML = `<i class='lucide-cpu'></i> AI 營運驅動因果分析`;
                }
                lucide.createIcons();
            }, 400);
        }

        function switchBiTab(panelId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('#detail-data-card .tab-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }
    </script>
